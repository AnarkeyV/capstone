name: CI/CD Release Pipeline - OIDC Template

# This workflow is provided as a production-hardening template.
# It is manual by default so it will not break the existing capstone demo pipeline.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies & Run Tests
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          python -m pytest -v

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${ACR_LOGIN_SERVER%%.azurecr.io}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${ACR_LOGIN_SERVER}/ecommerce-app:${GITHUB_SHA}"
          docker build --platform linux/amd64 -t "$IMAGE_TAG" -f app/Dockerfile .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Get AKS Credentials
        run: |
          az aks get-credentials             --resource-group "$RESOURCE_GROUP"             --name "$AKS_CLUSTER_NAME"             --overwrite-existing

      - name: Deploy to Kubernetes Cluster
        run: |
          sed -i "s|image: .*/ecommerce-app:.*|image: $IMAGE_TAG|g" kubernetes/deployment.yaml
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/pdb.yaml
          kubectl apply -f kubernetes/hpa.yaml
          kubectl rollout status deployment/capstone-app
