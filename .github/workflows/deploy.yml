name: CI/CD Release Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the latest code down to the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies & Run Tests
        run: |
          python -m pip install --upgrade pip
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi
          # pytest

      # 3. Log into Azure Container Registry
      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build and push Docker image
      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/ecommerce-app:v${{ github.run_number }} \
            -f app/Dockerfile .

          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ecommerce-app:v${{ github.run_number }}

      # 5. Connect to AKS
      - name: Set AKS Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBERNETES_KUBECONFIG }}

      # 6. Deploy to Kubernetes
      - name: Deploy to Kubernetes Cluster
        run: |
          sed -i 's|image: .*/ecommerce-app:v[0-9]*|image: ${{ secrets.ACR_LOGIN_SERVER }}/ecommerce-app:v${{ github.run_number }}|g' kubernetes/deployment.yaml

          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl rollout status deployment/capstone-app