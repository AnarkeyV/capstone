trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- script: |
    python --version
    pip --version
  displayName: "Check Python and pip"

- script: |
    python -m pip install --upgrade pip
    pip install -r app/requirements.txt
  displayName: "Install dependencies"

- script: |
    python -m pytest tests/ || echo "Tests not fully configured yet"
  displayName: "Run tests"