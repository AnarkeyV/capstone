apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-app
  labels:
    app: capstone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: capstone
  template:
    metadata:
      labels:
        app: capstone
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: app
        image: capstonereg047af007.azurecr.io/ecommerce-app:v1
        ports:
        - containerPort: 8000

        envFrom:
        - secretRef:
            name: app-secrets

        env:
        - name: AZURE_REGION
          value: "southeastasia"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5