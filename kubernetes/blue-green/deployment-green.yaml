apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-app-green
  namespace: staging
  labels:
    app: capstone-blue-green-demo
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capstone-blue-green-demo
      version: green
  template:
    metadata:
      labels:
        app: capstone-blue-green-demo
        version: green
    spec:
      containers:
        - name: app
          image: capstonetfacr047af007.azurecr.io/ecommerce-app:v24
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20